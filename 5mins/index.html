<!doctype html>
<html lang>
    <head>
        <title>The Gaze - Final Presentation</title>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <style>
                                    body,
                                    html {
                                        margin: 0;
                                        padding: 0;
                                        overflow: hidden;
                                        background: black;
                                        font-family: "Helvetica", sans-serif;
                                    }

                                    #video-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -100;
                /* 'contain' shows the WHOLE video frame without cropping */
                object-fit: contain;
                background: black; /* Fills any "empty" space with black */
                filter: brightness(0.6) contrast(1.2);
            }
                                    }

                                    #word-layer {
                                        position: absolute;
                                        top: 0;
                                        left: 0;
                                        width: 100vw;
                                        height: 100vh;
                                        pointer-events: none; /* Allows you to click "through" the words if needed */
                                    }

                                    .floating-word {
                                        position: absolute;
                                        color: white;
                                        font-size: 2rem;
                                        font-weight: bold;
                                        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
                                        transition: all 1s ease-in-out;
                                        animation: fadeIn 0.5s;
                                    }

                                    #qr-code {
                                        position: fixed;
                                        bottom: 20px;
                                        left: 20px;
                                        width: 150px;
                                        border: 5px solid white;
                                        z-index: 100;
                                    }

                                    @keyframes fadeIn {
                                        from {
                                            opacity: 0;
                                            transform: scale(0.5);
                                        }
                                        to {
                                            opacity: 1;
                                            transform: scale(1);
                                        }
                                    }
        </style>
    </head>
    <body>
        <video id="video-bg" autoplay muted loop playsinline>
            <source src="your-eye-loop.mp4" type="video/mp4" />
        </video>

        <div id="word-layer"></div>

        <img id="qr-code" src="your-qr-code.png" alt="Scan to participate" />

        <!-- Firebase SDKs -->
        <script type="module">
                                import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
                                import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

                                const firebaseConfig = {
                                    // PASTE YOUR FIREBASE CONFIG OBJECT HERE
                                    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
            const firebaseConfig = {
              apiKey: "AIzaSyBI5NZfm-DLjE3n_B3O81sY2Ar2GY9r1VU",
              authDomain: "megan-bf23d.firebaseapp.com",
              projectId: "megan-bf23d",
              storageBucket: "megan-bf23d.firebasestorage.app",
              messagingSenderId: "227294855047",
              appId: "1:227294855047:web:ed486d13c5c585c37b1d22",
              measurementId: "G-4C9K64JXDW"
            };
                        };

                        // Initialize Firebase
                        const app = initializeApp(firebaseConfig);
                        const analytics = getAnalytics(app);
                                };

                                const app = initializeApp(firebaseConfig);
                                const db = getDatabase(app);
                                const wordsRef = ref(db, 'responses');

                                // Listen for new words being added to the database
                                onChildAdded(wordsRef, (data) => {
                                    const word = data.val().text;
                                    spawnWord(word);
                                });

                                function spawnWord(text) {
                                    const x = Math.random() * (window.innerWidth - 100);
                                    const y = Math.random() * (window.innerHeight - 50);

                                    const wordElement = $('<div class="floating-word"></div>')
                                        .text(text)
                                        .css({ left: x, top: y });

                                    $('#word-layer').append(wordElement);
                                }

                                // KEYPRESS TRIGGER: Press 'C' to clear the screen for your conclusion
                                $(document).keydown(function(e) {
                                    if (e.key === 'c' || e.key === 'C') {
                                        $('.floating-word, #qr-code').fadeOut(2000);
                                        $('#video-bg').css('filter', 'brightness(1)');
                                    }
                                });
        </script>
    </body>
</html>
