<!DOCTYPE html>
<html lang="en">
    <head>
        <title>The Gaze - Final Presentation</title>
        <!-- jQuery Library -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        
        <!-- Link to your external JS file - This is the only script tag you need for your logic! -->
        <script type="module" src="script.js"></script>

        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: black;
                font-family: "Helvetica", sans-serif;
                width: 100vw;
                height: 100vh;
            }

            #video-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -100;
                object-fit: contain;
                background: black;
                filter: brightness(0.6) contrast(1.2);
            }

            #word-layer {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                pointer-events: none;
                z-index: 10;
            }

            .floating-word {
                position: absolute;
                color: white;
                font-size: 2.5rem;
                font-weight: bold;
                text-shadow: 2px 2px 15px rgba(0, 0, 0, 1);
                transition: all 1s ease-in-out;
                animation: fadeIn 0.8s ease-out;
            }

            #qr-code {
                position: fixed;
                bottom: 20px;
                left: 20px;
                width: 150px;
                border: 5px solid white;
                z-index: 100;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: scale(0.5);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }
        </style>
    </head>
    <body>
        <!-- The video tag uses the direct Dropbox link -->
        <video id="video-bg" autoplay muted loop playsinline preload="auto">
            <source
                src="https://www.dropbox.com/scl/fi/cv1y837n9p2xnlxcr2sax/your-eye-loop.mp4?rlkey=tfq34owmawb0zfbx3ea0u22zq&st=vs9hd0hj&raw=1"
                type="video/mp4" />
        </video>

        <div id="word-layer"></div>

        <img id="qr-code" src="qr-code.jpg" alt="Scan to participate" />

    </body>
</html>
