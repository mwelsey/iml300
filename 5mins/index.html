<!doctype html>
<html lang="en">
    <head>
        <title>The Gaze - Final Presentation</title>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script type="module" src="script.js"></script>

        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                overflow: hidden;
                font-family: "Helvetica", sans-serif;
                width: 100vw;
                height: 100vh;
                background: black;
            }

            #video-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                object-fit: contain;
                /* Filter starts here via JS now, not hardcoded CSS */
                transition: filter 3s ease-in-out;
            }

            #word-layer {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                pointer-events: none;
                z-index: 10;
            }

            .floating-word {
                position: absolute;
                color: white;
                font-size: 1.5rem; /* Smaller size */
                font-weight: bold;
                text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
                transition: all 5s linear; /* Smooth slow movement */
                white-space: nowrap;
            }

            #qr-code {
                position: fixed;
                bottom: 20px;
                right: 40px; /* Changed to right-aligned for better responsiveness */
                width: 150px;
                border: 5px solid white;
                z-index: 100;
                transition: opacity 3s ease;
            }
        </style>
    </head>
    <body>
        <video id="video-bg" autoplay muted loop playsinline preload="auto" style="background-color: black">
            <source
                src="https://www.dropbox.com/scl/fi/oq6hck3n4q5htjs80jprc/Megan_5mins.mp4?rlkey=okm6bzts9sirya5y2905lsusd&st=oztufszz&raw=1"
                type="video/mp4" />
            Your browser does not support the video tag.
        </video>

        <div id="word-layer"></div>

        <img id="qr-code" src="qr-code.jpg" alt="Scan to participate" />
    </body>
</html>
