<!doctype html>
<html lang="en">
    <head>
        <title>The Gaze - Final Presentation</title>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: black;
                font-family: "Helvetica", sans-serif;
                width: 100vw;
                height: 100vh;
            }

            #video-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -100;
                object-fit: contain; /* Shows full video without cropping */
                background: black;
                filter: brightness(0.6) contrast(1.2);
            }

            #word-layer {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                pointer-events: none;
                z-index: 10;
            }

            .floating-word {
                position: absolute;
                color: white;
                font-size: 2.5rem; /* Made slightly bigger for the presentation */
                font-weight: bold;
                text-shadow: 2px 2px 15px rgba(0, 0, 0, 1);
                transition: all 1s ease-in-out;
                animation: fadeIn 0.8s ease-out;
            }

            #qr-code {
                position: fixed;
                bottom: 20px;
                left: 20px;
                width: 150px;
                border: 5px solid white;
                z-index: 100;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: scale(0.5);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }
        </style>
    </head>
    <body>
        <video id="video-bg" autoplay muted loop playsinline>
            <source src="your-eye-loop.mp4" type="video/mp4" />
        </video>

        <div id="word-layer"></div>

        <img id="qr-code" src="qr-code.jpg" alt="Scan to participate" />

        <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBI5NZfm-DLjE3n_B3O81sY2Ar2GY9r1VU",
        authDomain: "megan-bf23d.firebaseapp.com",
        projectId: "megan-bf23d",
        storageBucket: "megan-bf23d.firebasestorage.app",
        messagingSenderId: "227294855047",
        appId: "1:227294855047:web:ed486d13c5c585c37b1d22",
        measurementId: "G-4C9K64JXDW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const wordsRef = ref(db, 'responses');

    // 1. TIMER LOGIC: 4 minutes = 240,000 milliseconds
    const fourMinutes = 4 * 60 * 1000; 
    
    setTimeout(() => {
        console.log("4 Minute Mark Reached: Triggering Purge.");
        triggerCleanse();
    }, fourMinutes);

    // 2. FIREBASE LISTENER
    onChildAdded(wordsRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.text) {
            spawnWord(data.text);
        }
    });

    function spawnWord(text) {
        const x = Math.random() * (window.innerWidth - 200) + 50;
        const y = Math.random() * (window.innerHeight - 100) + 50;

        const wordElement = $('<div class="floating-word"></div>')
            .text(text)
            .css({ left: x, top: y });

        $('#word-layer').append(wordElement);
    }

    // 3. THE CLEANSE FUNCTION (Reusable for Timer or Keypress)
    function triggerCleanse() {
        $('.floating-word, #qr-code').fadeOut(3000); // 3-second slow fade
        $('#video-bg').css('filter', 'brightness(1) contrast(1)'); // Eye becomes clear
    }

    // Manual backup trigger (Press 'C')
    $(document).keydown(function(e) {
        if (e.key.toLowerCase() === 'c') {
            triggerCleanse();
        }
    });
</script>
    </body>
</html>
