<!doctype html>
<html lang>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>What do you see?</title>
        <style>
            body {
                font-family: sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
                background: #111;
                color: white;
                text-align: center;
            }
            input {
                padding: 15px;
                font-size: 18px;
                width: 80%;
                border-radius: 8px;
                border: none;
                margin-bottom: 20px;
            }
            button {
                padding: 15px 30px;
                font-size: 18px;
                background: #fff;
                color: #000;
                border: none;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            }
            #confirmation {
                display: none;
                color: #4caf50;
            }
        </style>
    </head>
    <body>
        <div id="form-container">
            <h2>In one word,<br />what do you see when you look at me?</h2>
            <input type="text" id="word-input" placeholder="Enter one word..." maxlength="20" />
            <br />
            <button id="send-btn">Submit Perspective</button>
        </div>

        <div id="confirmation">
            <h2>Thank you for looking.</h2>
        </div>

                                    const val = document.getElementById('word-input').value;
                                    if(val) {

                                        document.getElementById('confirmation').style.display = 'block';
