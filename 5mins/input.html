<!doctype html>
<html lang>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>What do you see?</title>
        <style>
            body {
                font-family: sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
                background: #111;
                color: white;
                text-align: center;
            }
            input {
                padding: 15px;
                font-size: 18px;
                width: 80%;
                border-radius: 8px;
                border: none;
                margin-bottom: 20px;
            }
            button {
                padding: 15px 30px;
                font-size: 18px;
                background: #fff;
                color: #000;
                border: none;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            }
            #confirmation {
                display: none;
                color: #4caf50;
            }
        </style>
    </head>
    <body>
        <div id="form-container">
            <h2>In one word,<br />what do you see when you look at me?</h2>
            <input type="text" id="word-input" placeholder="Enter one word..." maxlength="20" />
            <br />
            <button id="send-btn">Submit Perspective</button>
        </div>

        <div id="confirmation">
            <h2>Thank you for looking.</h2>
        </div>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

            const firebaseConfig = {
                apiKey: "AIzaSyBI5NZfm-DLjE3n_B3O81sY2Ar2GY9r1VU",
                authDomain: "megan-bf23d.firebaseapp.com",
                projectId: "megan-bf23d",
                storageBucket: "megan-bf23d.firebasestorage.app",
                messagingSenderId: "227294855047",
                appId: "1:227294855047:web:ed486d13c5c585c37b1d22",
                measurementId: "G-4C9K64JXDW"
            };

            // Initialize Firebase once
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);

            // Get your elements
            const sendBtn = document.getElementById("send-btn");
            const wordInput = document.getElementById("word-input");
            const formContainer = document.getElementById("form-container");
            const confirmation = document.getElementById("confirmation");

            // Add the click listener
            sendBtn.addEventListener("click", () => {
                const val = wordInput.value.trim(); // .trim() removes accidental spaces

                if (val) {
                    console.log("Submitting:", val); // This helps you see if it's working in the console

                    push(ref(db, "responses"), {
                        text: val,
                        timestamp: Date.now()
                    })
                        .then(() => {
                            // This only runs after Firebase confirms it saved the data
                            formContainer.style.display = "none";
                            confirmation.style.display = "block";
                        })
                        .catch((error) => {
                            console.error("Firebase Error:", error);
                            alert("Oops! Something went wrong. Check your Database Rules.");
                        });
                } else {
                    alert("Please enter a word!");
                }
            });
        </script>
    </body>
</html>
