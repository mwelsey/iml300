<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js"></script>
        <title></title>

        <style>
            #bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 0;
            }

            .section {
                position: relative;
                z-index: 2;
            }
        </style>
    </head>

    <body>
        <canvas id="bg"></canvas>

        <div class="section">
            <h1 class="fade">This is everything I use in a day.</h1>
            <p class="fade">The objects I don’t think about. The objects I bought. The objects that feel like mine.</p>
            <div class="next fade" onclick="location.href='products.html'">→ so lets start with the objects</div>
        </div>

        <script>
            document.querySelectorAll(".fade").forEach((el, i) => {
                setTimeout(() => el.classList.add("visible"), i * 300);
            });

            const canvas = document.getElementById("bg");
            const ctx = canvas.getContext("2d");

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener("resize", resize);

            const imageSources = [
                "assets/airpods.jpg",
                "assets/allergy.jpg",
                "assets/bag.jpg",
                "assets/bodywash.jpg",
                "assets/brita.jpg",
                "assets/case.jpg",
                "assets/chapstick.jpg",
                "assets/conditioner.jpg",
                "assets/debitcard.jpg",
                "assets/deoderant.jpg",
                "assets/dino.jpg",
                "assets/dryerasemarkers.jpg",
                "assets/facewash.jpg",
                "assets/fork.jpg",
                "assets/hairbrush.jpg",
                "assets/hairoil.jpg",
                "assets/hairtie.jpg",
                "assets/hanger.jpg",
                "assets/icecubetray.jpg",
                "assets/laptop.jpg",
                "assets/lights.jpg",
                "assets/list.jpg",
                "assets/miniclaw.jpg",
                "assets/mirror.jpg",
                "assets/nailpolish.jpg",
                "assets/notebook.jpg",
                "assets/oura.jpg",
                "assets/owala.jpg",
                "assets/papertowel.jpg",
                "assets/pen.jpg",
                "assets/pencil.jpg",
                "assets/phone.jpg",
                "assets/plate.jpg",
                "assets/postit.jpg",
                "assets/purse.jpg",
                "assets/sd.jpg",
                "assets/sdreader.jpg",
                "assets/shampoo.jpg",
                "assets/sketchbook.jpg",
                "assets/sleepmask.jpg",
                "assets/toothbrush.jpg",
                "assets/toothpaste.jpg",
                "assets/towel.jpg",
                "assets/vacuum.jpg",
                "assets/wallet.jpg",
                "assets/wallmirror.jpg",
                "assets/washcloth.jpg"
            ];

            let images = [];
            let items = [];
            let loaded = 0;

            imageSources.forEach((src) => {
                const img = new Image();
                img.src = src;

                img.onload = () => {
                    loaded++;
                    if (loaded === imageSources.length) start();
                };

                img.onerror = () => {
                    console.log("failed:", src);
                    loaded++;
                    if (loaded === imageSources.length) start();
                };

                images.push(img);
            });

            function start() {
                for (let i = 0; i < 40; i++) {
                    items.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 40 + 25,
                        speed: Math.random() * 0.4 + 0.1,
                        rot: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.02,
                        img: images[Math.floor(Math.random() * images.length)]
                    });
                }

                animate();
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                items.forEach((o) => {
                    o.y += o.speed;
                    o.rot += o.rotSpeed;

                    if (o.y > canvas.height + 50) {
                        o.y = -50;
                        o.x = Math.random() * canvas.width;
                    }

                    ctx.save();
                    ctx.translate(o.x, o.y);
                    ctx.rotate(o.rot);

                    ctx.drawImage(o.img, -o.size / 2, -o.size / 2, o.size, o.size);

                    ctx.restore();
                });

                requestAnimationFrame(animate);
            }
        </script>
    </body>
</html>
