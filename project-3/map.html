<!doctype html>
<html lang>
    <head>
        <title></title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    </head>
    <body>
        <div id="map" style="height: 100vh"></div>

        <div class="section" style="position: absolute; top: 0">
            <h1>Far away.</h1>
            <p>But connected to me.</p>
            <div class="next" onclick="location.href='labor.html'">→ who makes them?</div>
        </div>

        <script>
            let map = L.map("map").setView([20, 0], 2);

            L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

            L.marker([35, 103]).addTo(map).bindPopup("Electronics manufacturing");
            L.marker([10, 106]).addTo(map).bindPopup("Garment factories");
        </script>
    </body>
</html>
