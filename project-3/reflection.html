<!doctype html>
<html lang="en">
  <head>
    <title>Reflection</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        margin: 0;
        background-color: white;
        font-family: sans-serif;
        padding: 20px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: repeating-linear-gradient(
          90deg,
          #000,
          #000 2px,
          #fff 2px,
          #fff 4px,
          #000 4px,
          #000 5px,
          #fff 5px,
          #fff 10px
        );
        background-size: 200% 100%;
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask-composite: exclude;
        -webkit-mask-composite: destination-out;
        padding: 25px;
        z-index: 9999;
        pointer-events: none;
        animation: barcodeMove 10s linear infinite;
      }

      @keyframes barcodeMove {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 50% 0;
        }
      }

      p {
        line-height: 1.6;
        color: #444;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <h1>My identity is built through these things.</h1>
    </div>

    <div class="section">
      <h1>But they are not really mine.</h1>
    </div>

    <div class="section">
      <h1>They connect me to systems I don’t see.</h1>
      <p>
        This project traces those connections through the objects I use every day, revealing how personal consumption is
        shaped by global labor and production.
      </p>
      <div class="next" onclick="location.href='sketch.html'">→ continue</div>
    </div>
  </body>
</html>
